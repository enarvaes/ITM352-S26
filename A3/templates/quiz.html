{% extends "base.html" %}

{% block title %}Quiz - Quiz Game{% endblock %}

{% block content %}
<div class="quiz-container">
    <div class="card mb-4 quiz-header">
        <div class="card-body">
            <div class="row align-items-center">
                <div class="col-md-6">
                    <h5 class="mb-0">Question <span id="currentQuestion">1</span> of <span id="totalQuestions">0</span></h5>
                </div>
                <div class="col-md-6 text-end">
                    <span id="scoreDisplay" class="badge bg-success">Answered: 0</span>
                </div>
            </div>
        </div>
    </div>

    <div class="card mb-4 question-card">
        <div class="card-body p-4">
            <h3 id="questionText" class="mb-4">Loading question...</h3>
            <div id="optionsContainer" class="options-container"></div>
            <div class="mt-3">
                <button id="hintBtn" class="btn btn-outline-warning btn-sm">
                    &#128161; Get Hint <span class="text-muted">(-10 pts)</span>
                </button>
                <div id="hintText" class="alert alert-warning mt-2 d-none"></div>
            </div>
        </div>
    </div>

    <div class="row gap-2 mb-4">
        <div class="col">
            <button id="prevBtn" class="btn btn-outline-secondary w-100" disabled>
                <i class="fas fa-arrow-left"></i> Previous
            </button>
        </div>
        <div class="col">
            <button id="nextBtn" class="btn btn-primary w-100" disabled>
                Next <i class="fas fa-arrow-right"></i>
            </button>
        </div>
        <div class="col">
            <button id="submitBtn" class="btn btn-success w-100 d-none">
                <i class="fas fa-check"></i> Submit Quiz
            </button>
        </div>
    </div>

    <div id="feedbackContainer" class="mb-4"></div>
</div>

<div class="modal fade" id="explanationModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="explanationTitle">Answer Explanation</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p id="explanationText"></p>
            </div>
        </div>
    </div>
</div>

<script>
let currentQuestionIndex = 0;
let totalQuestions = 0;
// answers[i] tracks the user's selection client-side for pre-filling on back/forward.
// The server is the authority on correctness.
let answers = [];
let quizStartTime = null;
let hintsUsed = 0;
let explanationModal = null;

async function initializeQuiz() {
    explanationModal = new bootstrap.Modal(document.getElementById("explanationModal"));
    try {
        const response = await fetch("/api/quiz-start", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({})
        });
        const data = await response.json();
        if (!data.success) {
            alert("Failed to start quiz: " + data.error);
            return;
        }

        totalQuestions = data.total_questions;
        quizStartTime = new Date();
        answers = new Array(totalQuestions).fill(null);
        document.getElementById("totalQuestions").textContent = totalQuestions;
        loadQuestion(currentQuestionIndex);
    } catch (error) {
        console.error("Error initializing quiz:", error);
        alert("Error starting quiz");
    }
}

async function loadQuestion(index) {
    try {
        const response = await fetch(`/api/question/${index}`);
        const data = await response.json();
        if (!data.success) {
            alert("Failed to load question: " + (data.error || ""));
            return;
        }

        const question = data.question;
        document.getElementById("questionText").textContent = question.text;
        document.getElementById("currentQuestion").textContent = index + 1;

        const optionsContainer = document.getElementById("optionsContainer");
        optionsContainer.innerHTML = "";

        question.options.forEach((option, idx) => {
            const optionDiv = document.createElement("div");
            optionDiv.className = "option-item mb-2";
            const isChecked = answers[index] === option ? "checked" : "";
            optionDiv.innerHTML = `
                <input type="radio" id="option${idx}" name="answer" value="${option}" ${isChecked}>
                <label for="option${idx}" class="ms-2">${option}</label>
            `;
            optionsContainer.appendChild(optionDiv);
        });

        document.querySelectorAll('input[name="answer"]').forEach(radio => {
            radio.addEventListener("change", function () {
                answers[currentQuestionIndex] = this.value;
                submitAnswer(currentQuestionIndex, this.value);
            });
        });

        // Reset hint display on question change; keep button disabled if the quiz hint was already used.
        document.getElementById("hintText").classList.add("d-none");
        const hintBtn = document.getElementById("hintBtn");
        hintBtn.disabled = hintsUsed >= 1;
        hintBtn.innerHTML = hintsUsed >= 1
            ? "Hint Used"
            : '&#128161; Get Hint <span class="text-muted">(-10 pts)</span>';

        updateButtons();
        updateAnsweredCount();
    } catch (error) {
        console.error("Error loading question:", error);
        document.getElementById("questionText").textContent = "Error loading question. Please refresh and try again.";
    }
}

async function requestHint() {
    if (hintsUsed >= 1) return;
    try {
        const response = await fetch("/api/get-hint", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ question_id: currentQuestionIndex })
        });
        const data = await response.json();
        if (!data.success) {
            alert(data.error);
            return;
        }
        hintsUsed++;
        const hintBtn = document.getElementById("hintBtn");
        hintBtn.disabled = true;
        hintBtn.textContent = "Hint Used";
        const hintText = document.getElementById("hintText");
        hintText.textContent = "Hint: " + data.hint;
        hintText.classList.remove("d-none");
    } catch (error) {
        console.error("Error getting hint:", error);
    }
}

async function submitAnswer(index, answer) {
    // The server records the answer; we just use the response for feedback/explanation.
    try {
        const response = await fetch("/api/submit-answer", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ question_id: index, answer: answer })
        });
        const data = await response.json();
        if (!data.success) return;
        showFeedback(data);
    } catch (error) {
        console.error("Error submitting answer:", error);
    }
}

function showFeedback(data) {
    const feedbackContainer = document.getElementById("feedbackContainer");
    const isCorrect = data.is_correct;
    feedbackContainer.innerHTML = `
        <div class="alert alert-${isCorrect ? "success" : "danger"} alert-dismissible fade show">
            <strong>${isCorrect ? "&#10003; Correct!" : "&#10007; Incorrect"}</strong>
            ${isCorrect ? " Great job!" : " The correct answer is: <strong>" + data.correct_answer + "</strong>"}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
    `;

    if (explanationModal) {
        document.getElementById("explanationText").textContent = data.explanation || "";
        const title = document.getElementById("explanationTitle");
        title.innerHTML = isCorrect
            ? '<span class="text-success">&#10003; Correct Answer</span>'
            : '<span class="text-danger">&#10007; Incorrect Answer</span>';
        explanationModal.show();
    }
}

function updateAnsweredCount() {
    const answered = answers.filter(a => a !== null).length;
    document.getElementById("scoreDisplay").textContent = `Answered: ${answered}/${totalQuestions}`;
}

function updateButtons() {
    document.getElementById("prevBtn").disabled = currentQuestionIndex === 0;
    document.getElementById("nextBtn").disabled = answers[currentQuestionIndex] === null;

    if (currentQuestionIndex === totalQuestions - 1) {
        document.getElementById("nextBtn").classList.add("d-none");
        document.getElementById("submitBtn").classList.remove("d-none");
    } else {
        document.getElementById("nextBtn").classList.remove("d-none");
        document.getElementById("submitBtn").classList.add("d-none");
    }
}

document.getElementById("prevBtn").addEventListener("click", () => {
    if (currentQuestionIndex > 0) {
        currentQuestionIndex--;
        loadQuestion(currentQuestionIndex);
    }
});

document.getElementById("nextBtn").addEventListener("click", () => {
    if (currentQuestionIndex < totalQuestions - 1) {
        currentQuestionIndex++;
        loadQuestion(currentQuestionIndex);
    }
});

document.getElementById("submitBtn").addEventListener("click", finishQuiz);
document.getElementById("hintBtn").addEventListener("click", requestHint);

async function finishQuiz() {
    const timeTaken = Math.floor((new Date() - quizStartTime) / 1000);
    try {
        const response = await fetch("/api/submit-quiz", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ time_taken: timeTaken })
        });
        const data = await response.json();
        if (data.success) {
            window.location.href = `/results?score=${data.score}&correct=${data.correct}&total=${data.total}&time_taken=${data.time_taken}&hints_used=${data.hints_used}`;
        } else {
            alert("Could not submit quiz: " + (data.error || ""));
        }
    } catch (error) {
        console.error("Error finishing quiz:", error);
    }
}

document.addEventListener("DOMContentLoaded", initializeQuiz);
</script>
{% endblock %}

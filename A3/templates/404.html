{% extends "base.html" %}

{% block title %}Page Not Found - Quiz Game{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center py-5">
        <h1 class="display-1">404</h1>
        <h2 class="mb-4">Page Not Found</h2>
        <p class="lead text-muted mb-4">The page you're looking for doesn't exist or has been moved.</p>
        <div class="gap-2 d-flex">
            <a href="/" class="btn btn-primary flex-grow-1">
                <i class="fas fa-home"></i> Back to Home
            </a>
            <a href="/dashboard" class="btn btn-secondary flex-grow-1">
                <i class="fas fa-dashboard"></i> Dashboard
            </a>
        </div>
    </div>
</div>
{% endblock %}

<!DOCTYPE html>
<html lang="en">
<head>
   <title>Memes'R'Us</title>
   <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=0.8">
   <meta http-equiv="refresh" content="10; url=http://127.0.0.1:5000" />
</head>
<body>
    <h1>Wholesome Meme</h1>
    <p>Source subreddit: {{ subreddit }}</p>

    {% if meme_url %}
    <img src="{{ meme_url }}" alt="Wholesome meme" style="max-width: 90vw; max-height: 80vh;">
    {% else %}
    <p>Could not load meme right now. Page will refresh in 10 seconds.</p>
    {% endif %}
</body>
</html>
